<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1E4FAF;--rose:#C4726A;--navy:#0A1628;--white:#FFFFFF;--gray-light:#F4F6FB;--gray-mid:#E2E8F4;--text:#1A2540;--text-muted:#5C6A88;}
body{font-family:'Barlow',sans-serif;color:var(--text);background:var(--white);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:16px 5%;background:#0a1628;border-bottom:1px solid rgba(255,255,255,0.08);}
.logo-wrap{display:inline-flex;align-items:center;text-decoration:none;}
.logo-wrap img{height:64px;width:auto;filter:invert(1) hue-rotate(180deg) brightness(0.96) contrast(1.02);}
.success-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:var(--gray-light);padding:80px 5%;}
.success-card{max-width:560px;width:100%;background:#fff;border-radius:12px;padding:56px 48px;text-align:center;box-shadow:0 8px 40px rgba(30,79,175,.09);}
@media(max-width:600px){.success-card{padding:36px 24px;}}
.success-icon{font-size:72px;display:block;margin-bottom:24px;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.success-card h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.1rem);color:var(--navy);margin-bottom:16px;line-height:1.25;}
.success-card p{font-size:1rem;color:var(--text-muted);line-height:1.7;margin-bottom:32px;font-weight:300;}
.btn-back{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--navy);color:#fff;padding:14px 28px;border-radius:6px;text-decoration:none;font-weight:600;font-size:.95rem;transition:all .2s;}
.btn-back:hover{background:var(--blue);transform:translateY(-1px);}
footer{background:var(--navy);padding:24px 5%;text-align:center;}
footer p{color:rgba(255,255,255,.35);font-size:.8rem;}
footer a{color:rgba(255,255,255,.35);text-decoration:none;}
